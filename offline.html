<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет подключения — Timofeyev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #141414;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 36px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #8e8e93;
            line-height: 1.5;
            max-width: 280px;
            margin-bottom: 32px;
        }
        button {
            background: #fc3f1e;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .brand {
            position: absolute;
            top: 24px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="brand">Timofeyev</div>
    <div class="icon">📡</div>
    <h1>Нет подключения</h1>
    <p>Проверьте интернет-соединение и попробуйте снова</p>
    <button onclick="window.location.reload()">Повторить</button>
</body>
</html>
